<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" width="6" height="6">
  <!-- panel background -->
  <rect x="4" y="4" width="52" height="52" rx="4" fill="#2a2a2e" stroke="#555" stroke-width="1.5"/>
  <!-- inner bezel -->
  <rect x="8" y="8" width="44" height="44" rx="2" fill="none" stroke="#444" stroke-width="0.75"/>
  <!-- top indicator light -->
  <circle cx="30" cy="14" r="3" fill="#4a4" stroke="#2d2d30" stroke-width="1"/>
  <!-- up arrow (open) -->
  <path d="M30 22 L38 30 L34 30 L34 34 L26 34 L26 30 L22 30 Z" fill="#ccc" stroke="#888" stroke-width="0.5"/>
  <!-- divider line -->
  <line x1="16" y1="38" x2="44" y2="38" stroke="#555" stroke-width="0.75"/>
  <!-- down arrow (close) -->
  <path d="M30 52 L22 44 L26 44 L26 40 L34 40 L34 44 L38 44 Z" fill="#999" stroke="#666" stroke-width="0.5"/>
</svg>
